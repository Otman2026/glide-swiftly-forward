name: Build Windows Setup (.exe)

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: electron

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Copy app icon (fallback to PWA icon)
        shell: bash
        run: |
          if [ -f ../public/icon-512.png ]; then
            cp ../public/icon-512.png icon.png
          fi

      - name: Install desktop shell deps
        run: npm install --no-audit --no-fund

      - name: Build Windows NSIS installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          DEBUG: electron-builder
        run: npm run dist:win

      - name: List release output (debug)
        if: always()
        shell: bash
        run: ls -la release/ || echo "no release dir"

      - name: Upload installer artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SAIFO-TRANSPORT-ERP-Windows-Setup
          path: electron/release/*Setup*.exe
          if-no-files-found: warn

      - name: Publish latest installer download
        if: github.ref_type == 'branch'
        uses: ncipollo/release-action@v1
        with:
          tag: windows-latest
          name: SAIFO Windows Setup - Latest
          body: |
            أحدث ملف تثبيت Windows تم بناؤه تلقائياً من آخر رفع للكود.

            حمّل ملف الـ Setup من قسم Assets بالأسفل.
          artifacts: electron/release/*Setup*.exe
          artifactErrorsFailBuild: true
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Attach installer to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: electron/release/*Setup*.exe
          token: ${{ secrets.GITHUB_TOKEN }}
