name: Build Windows Setup (.exe)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: electron

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Copy app icon (fallback to PWA icon)
        shell: bash
        run: |
          if [ -f ../public/icon-512.png ]; then
            cp ../public/icon-512.png icon.png
          fi

      - name: Install desktop shell deps
        run: npm install --no-audit --no-fund

      - name: Build Windows NSIS installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:win

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: SAIFO-TRANSPORT-ERP-Windows-Setup
          path: electron/release/*Setup*.exe
          if-no-files-found: error

      - name: Attach installer to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: electron/release/*Setup*.exe
          token: ${{ secrets.GITHUB_TOKEN }}
